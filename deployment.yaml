apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: petclinic
  template:
    metadata:
      labels:
        app: petclinic
    spec:
      securityContext:
        runAsNonRoot: true

      containers:
      - name: petclinic
        image: IMAGE_PLACEHOLDER

        ports:
        - containerPort: 8080

        securityContext:
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL  
        volumeMounts:
          - name: tmp
            mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}
